name: Build ANTSDR UHD Debian Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 4.0.0.0)'
        required: false
        default: '4.0.0.0'

env:
  PKG_NAME: antsdr-uhd
  PKG_VERSION: ${{ github.event.inputs.version || '4.0.0.0' }}
  PKG_RELEASE: 1

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            qemu: false
          - arch: arm64
            platform: linux/arm64
            qemu: true
          - arch: riscv64
            platform: linux/riscv64
            qemu: true

    name: Build ${{ matrix.arch }}
    timeout-minutes: 720  # 12h - riscv64 under QEMU is very slow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build .deb in container
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/output:/output \
            -e PKG_NAME="${{ env.PKG_NAME }}" \
            -e PKG_VERSION="${{ env.PKG_VERSION }}" \
            -e PKG_RELEASE="${{ env.PKG_RELEASE }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:noble bash -c '
              set -ex

              apt-get update
              apt-get install -y --no-install-recommends \
                autoconf automake build-essential ccache cmake \
                cpufrequtils doxygen ethtool g++ git \
                libboost-all-dev libncurses6 libncurses-dev \
                libpthread-stubs0-dev libusb-1.0-0 libusb-1.0-0-dev \
                python3-dev python3-mako python3-numpy python3-requests \
                python3-scipy python3-setuptools python3-ruamel.yaml \
                checkinstall pkg-config ca-certificates

              cd /src/host
              mkdir -p build && cd build

              cmake ../ \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DCMAKE_BUILD_TYPE=Release \
                -DENABLE_TESTS=OFF \
                -DENABLE_EXAMPLES=ON

              make -j$(nproc)
              mkdir -p /usr/share/doc/uhd
              # Build the .deb via checkinstall
              checkinstall \
                --type=debian \
                --pkgname="${PKG_NAME}" \
                --pkgversion="${PKG_VERSION}" \
                --pkgrelease="${PKG_RELEASE}" \
                --arch=$(dpkg --print-architecture) \
                --pkglicense="GPL-3.0" \
                --pkggroup="comm" \
                --maintainer="seb@penthertz.com" \
                --provides="${PKG_NAME}" \
                --requires="libboost-chrono1.83.0,libboost-filesystem1.83.0,libboost-program-options1.83.0,libboost-serialization1.83.0,libboost-thread1.83.0,libusb-1.0-0,python3-numpy,python3-mako,python3-ruamel.yaml" \
                --nodoc \
                --backup=no \
                --deldoc=yes \
                --deldesc=yes \
                --delspec=yes \
                --default \
                --install=no \
                make install

              cp *.deb /output/
              echo "Built package:"
              ls -lh /output/*.deb
              dpkg-deb --info /output/*.deb
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}_${{ env.PKG_VERSION }}-${{ env.PKG_RELEASE }}_${{ matrix.arch }}
          path: output/*.deb
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs
          merge-multiple: true

      - name: List packages
        run: |
          echo "=== Built packages ==="
          ls -lh debs/
          for f in debs/*.deb; do
            echo "--- $(basename $f) ---"
            dpkg-deb --info "$f" | grep -E '(Package|Version|Architecture|Installed-Size|Depends)'
          done

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
          generate_release_notes: true
          body: |
            ## ANTSDR UHD ${{ env.PKG_VERSION }}

            Pre-built Debian packages for Ubuntu Noble (24.04).

            ### Install
            ```bash
            wget <url-to-deb>
            sudo dpkg -i antsdr-uhd_*.deb
            sudo apt-get install -f -y
            sudo ldconfig
            ```

            ### Architectures
            - `amd64` - x86_64
            - `arm64` - AArch64
            - `riscv64` - RISC-V 64

      - name: Upload debs for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: all-debs-${{ env.PKG_VERSION }}
          path: debs/*.deb
          retention-days: 90