name: Build ANTSDR UHD Debian Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 4.0.0.0)'
        required: false
        default: '4.0.0.0'

env:
  PKG_NAME: antsdr-uhd
  PKG_VERSION: ${{ github.event.inputs.version || '4.0.0.0' }}
  PKG_RELEASE: 1

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            qemu: false
          - arch: arm64
            platform: linux/arm64
            qemu: true
          - arch: riscv64
            platform: linux/riscv64
            qemu: true

    name: Build ${{ matrix.arch }}
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build .deb in container
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/output:/output \
            -e PKG_NAME="${{ env.PKG_NAME }}" \
            -e PKG_VERSION="${{ env.PKG_VERSION }}" \
            -e PKG_RELEASE="${{ env.PKG_RELEASE }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:noble bash -c '
              set -ex

              apt-get update
              apt-get install -y --no-install-recommends \
                autoconf automake build-essential ccache cmake \
                ethtool g++ git ca-certificates \
                libboost-all-dev libncurses6 libncurses-dev \
                libpthread-stubs0-dev libusb-1.0-0 libusb-1.0-0-dev \
                python3-dev python3-mako python3-numpy python3-requests \
                python3-scipy python3-setuptools python3-ruamel.yaml \
                pkg-config

              ARCH=$(dpkg --print-architecture)
              PKG_ROOT=/tmp/pkg-root

              cd /src/host
              mkdir -p builddir && cd builddir

              cmake ../ \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DCMAKE_BUILD_TYPE=Release \
                -DENABLE_TESTS=OFF \
                -DENABLE_EXAMPLES=ON \
                -DENABLE_DOXYGEN=OFF \
                -DENABLE_MAN_PAGES=OFF

              make -j$(nproc)

              # Install into staging directory
              make install DESTDIR=${PKG_ROOT}

              # Build .deb with dpkg-deb
              mkdir -p ${PKG_ROOT}/DEBIAN
              INSTALLED_SIZE=$(du -sk ${PKG_ROOT} | cut -f1)

              cat > ${PKG_ROOT}/DEBIAN/control << EOF
          Package: ${PKG_NAME}
          Version: ${PKG_VERSION}-${PKG_RELEASE}
          Architecture: ${ARCH}
          Maintainer: seb@penthertz.com
          Installed-Size: ${INSTALLED_SIZE}
          Depends: libboost-chrono1.83.0, libboost-filesystem1.83.0, libboost-program-options1.83.0, libboost-serialization1.83.0, libboost-thread1.83.0, libusb-1.0-0, python3-numpy, python3-mako, python3-ruamel.yaml, python3-requests
          Provides: antsdr-uhd, uhd-host
          Conflicts: uhd-host, libuhd-dev, libuhd4.6.0
          Section: comm
          Priority: optional
          Homepage: https://github.com/MicroPhase/antsdr_uhd
          Description: ANTSDR UHD - USRP Hardware Driver for ANTSDR devices
           UHD (USRP Hardware Driver) fork for MicroPhase ANTSDR
           software-defined radio devices. Provides the UHD library,
           utilities, and Python bindings for ANTSDR E200/E310 hardware.
          EOF

              # Post-install: ldconfig + udev rules reload
              cat > ${PKG_ROOT}/DEBIAN/postinst << "POSTINST"
          #!/bin/bash
          set -e
          ldconfig
          if command -v udevadm > /dev/null 2>&1; then
            udevadm control --reload-rules 2>/dev/null || true
            udevadm trigger 2>/dev/null || true
          fi
          POSTINST
              chmod 755 ${PKG_ROOT}/DEBIAN/postinst

              # Post-remove: ldconfig
              cat > ${PKG_ROOT}/DEBIAN/postrm << "POSTRM"
          #!/bin/bash
          set -e
          ldconfig
          POSTRM
              chmod 755 ${PKG_ROOT}/DEBIAN/postrm

              DEB_FILE="/output/${PKG_NAME}_${PKG_VERSION}-${PKG_RELEASE}_${ARCH}.deb"
              dpkg-deb --build ${PKG_ROOT} ${DEB_FILE}

              echo "=== Built package ==="
              ls -lh ${DEB_FILE}
              dpkg-deb --info ${DEB_FILE}
              echo "=== Package contents (first 50 lines) ==="
              dpkg-deb --contents ${DEB_FILE} | head -50
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}_${{ env.PKG_VERSION }}-${{ env.PKG_RELEASE }}_${{ matrix.arch }}
          path: output/*.deb
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs
          merge-multiple: true

      - name: List packages
        run: |
          echo "=== Built packages ==="
          ls -lh debs/
          for f in debs/*.deb; do
            echo "--- $(basename $f) ---"
            dpkg-deb --info "$f" | grep -E '(Package|Version|Architecture|Installed-Size|Depends|Provides)'
          done

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
          generate_release_notes: true
          body: |
            ## ANTSDR UHD ${{ env.PKG_VERSION }}

            Pre-built Debian packages for Ubuntu Noble (24.04).

            ### Install
            ```bash
            wget <url-to-deb>
            sudo dpkg -i antsdr-uhd_*.deb
            sudo apt-get install -f -y
            sudo ldconfig
            ```

            ### Architectures
            - `amd64` - x86_64
            - `arm64` - AArch64
            - `riscv64` - RISC-V 64

      - name: Upload debs for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: all-debs-${{ env.PKG_VERSION }}
          path: debs/*.deb
          retention-days: 90